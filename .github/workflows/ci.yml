name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    env:
      PYTHONPATH: .
      DATABASE_URL: sqlite:///./ci_test.db
      DEMO_MODE: "true"
      SECRET_KEY: ci-only-secret-key-with-at-least-32-bytes
      GITHUB_WEBHOOK_SECRET: ci-webhook-secret
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Check backend formatting
        run: ruff format --check app tests
      - name: Lint backend
        run: ruff check app tests
      - name: Type-check backend
        run: mypy app --ignore-missing-imports --no-error-summary --show-error-codes
      - name: Scan backend security
        run: bandit -q -ll -r app
      - name: Compile backend
        run: python -m compileall -q app tests
      - name: Run backend tests
        run: pytest --cov=app --cov-report=term-missing

  frontend-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    env:
      NODE_ENV: development
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
          registry-url: https://registry.npmjs.org
      - name: Install frontend dependencies
        run: npm ci --include=dev --no-audit --no-fund
      - name: Verify Vite type definitions
        run: test -f node_modules/vite/client.d.ts
      - name: Type-check frontend
        run: npm run lint
      - name: Build frontend
        run: npm run build
      - name: Audit frontend dependencies
        run: npm audit --audit-level=high

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [backend-tests, frontend-build]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Build backend image
        run: docker build -f backend/Dockerfile -t devops-review-backend:ci .
      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t devops-review-frontend:ci .
      - name: Build analyzer worker image
        run: docker build -f docker/analyzer.Dockerfile -t devops-review-analyzer:ci .
