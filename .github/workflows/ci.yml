name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      PYTHONPATH: .
      DATABASE_URL: sqlite:///./ci_test.db
      DEMO_MODE: "true"
      SECRET_KEY: ci-only-secret-key-with-at-least-32-bytes
      GITHUB_WEBHOOK_SECRET: ci-webhook-secret
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: pytest --cov=app --cov-report=term-missing

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    steps:
      - uses: actions/checkout@v5
      - name: Build backend image
        run: docker build -f backend/Dockerfile -t devops-review-backend:ci .
      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t devops-review-frontend:ci .
