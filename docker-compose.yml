services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: devops_review
      POSTGRES_USER: devops
      POSTGRES_PASSWORD: devops-local-password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devops -d devops_review"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://devops:devops-local-password@postgres:5432/devops_review
      REDIS_URL: redis://redis:6379/0
      FRONTEND_URL: http://localhost:8080
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - review_workspaces:/app/workspaces
    ports:
      - "8000:8000"

  worker:
    build:
      context: .
      dockerfile: docker/analyzer.Dockerfile
    command: celery -A app.workers.celery_app.celery worker --loglevel=INFO
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://devops:devops-local-password@postgres:5432/devops_review
      REDIS_URL: redis://redis:6379/0
      ANALYZER_EXECUTION_ENABLED: "true"
      RUN_PROJECT_TESTS: "false"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - review_workspaces:/app/workspaces

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: /api
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data:
  redis_data:
  review_workspaces:
